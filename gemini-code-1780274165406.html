        }

        }

            background: #fff;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .question-text {
            font-weight: 600;
            font-size: 1.1em;
            color: var(--primary);
            margin-bottom: 15px;
        }
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .option {
            padding: 12px 15px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
        }
        .option:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
            transform: translateX(4px);
        }
        /* Classes dynamiques appliquées en JS */
        .quiz-item.disabled .option {
            pointer-events: none; /* Désactive les clics après réponse */
        }
        .option.correct {
            background: #d1fae5 !important;
            border-color: var(--success) !important;
            color: #065f46;
            font-weight: bold;
        }
        .option.wrong {
            background: #fee2e2 !important;
            border-color: var(--error) !important;
            color: #991b1b;
        }
        .feedback-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            font-size: 0.95em;
            display: none; /* Caché par défaut */
            animation: fadeIn 0.4s ease;
        }
        .feedback-box.visible {
            display: block;
        }
        .feedback-box.correct-feedback {
            background: #ecfdf5;
            border-left: 5px solid var(--success);
            color: #065f46;
        }
        .feedback-box.wrong-feedback {
            background: #fffaf0;
            border-left: 5px solid #f59e0b;
            color: #78350f;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #94a3b8;
            font-size: 0.85em;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;

</head>

    // Génération dynamique du HTML
    const container = document.getElementById('quiz-container');

    qcmData.forEach((item, qIdx) => {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'quiz-item';
        itemDiv.id = `q-${qIdx}`;

        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.innerText = item.q;
        itemDiv.appendChild(qText);

        const optionsOl = document.createElement('ul');
        optionsOl.className = 'options-list';

        item.options.forEach((optText, oIdx) => {
            const optLi = document.createElement('li');
            optLi.className = 'option';
            optLi.innerHTML = `<strong>${String.fromCharCode(65 + oIdx)})</strong>&nbsp;&nbsp;${optText}`;
            
            // Événement au clic
            optLi.addEventListener('click', () => checkAnswer(qIdx, oIdx, item.correct, item.rationale));
            optionsOl.appendChild(optLi);
        });

        itemDiv.appendChild(optionsOl);

        // Zone de feedback cachée au départ
        const feedback = document.createElement('div');
        feedback.className = 'feedback-box';
        feedback.id = `fb-${qIdx}`;
        itemDiv.appendChild(feedback);

        container.appendChild(itemDiv);
    });

    // Fonction de vérification
    function checkAnswer(questionIdx, selectedIdx, correctIdx, rationaleText) {
        const questionCard = document.getElementById(`q-${questionIdx}`);
        
        // Si la question a déjà été répondue, on évite les clics multiples
        if (questionCard.classList.contains('disabled')) return;
        
        questionCard.classList.add('disabled');
        const optionsHTML = questionCard.querySelectorAll('.option');
        const feedbackBox = document.getElementById(`fb-${questionIdx}`);

        // Coloration de l'option choisie et de la bonne réponse
        if (selectedIdx === correctIdx) {
            optionsHTML[selectedIdx].classList.add('correct');
            feedbackBox.className = 'feedback-box visible correct-feedback';
            feedbackBox.innerHTML = `<strong>✨ Correct !</strong><br><br>${rationaleText}`;
        } else {
            optionsHTML[selectedIdx].classList.add('wrong');
            optionsHTML[correctIdx].classList.add('correct'); // Montre la bonne réponse
            feedbackBox.className = 'feedback-box visible wrong-feedback';
            feedbackBox.innerHTML = `<strong>❌ Mauvaise réponse.</strong> La bonne réponse était l'option <strong>${String.fromCharCode(65 + correctIdx)}</strong>.<br><br><strong>Explication :</strong> ${rationaleText}`;
        }
    }
